<!doctype html>
<html lang="en" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Smart Life Multi-Language Chat</title>

<style>

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI","Cairo",sans-serif;
  background:#0b1220;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */

header{
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:40px;
}

.dir-toggle{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

/* ===== زر الشات ===== */

.chat-btn{

  position:fixed;
  bottom:25px;
  left:25px;

  display:flex;
  align-items:center;
  gap:10px;

  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff;

  padding:14px 18px;

  border-radius:40px;
  border:none;

  font-size:15px;
  font-weight:600;

  box-shadow:
  0 10px 25px rgba(0,0,0,.35),
  0 0 0 1px rgba(255,255,255,.08) inset;

  cursor:pointer;

  transition:all .25s ease;
}

.chat-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 35px rgba(0,0,0,.4);
}

.chat-btn svg{
  width:20px;
  height:20px;
}

</style>

<script>

/* ========= توليد رقم ثابت لكل جهاز ========= */

function getOrCreateErpId(){

  const key="sl_erp_identity";
  let id=localStorage.getItem(key);

  if(!id){

    const num=Math.floor(Math.random()*99+1)
      .toString()
      .padStart(2,"0");

    id="ERP-mawared-"+num;

    localStorage.setItem(key,id);
  }

  return id;
}

function buildProfile(){

  const erpId=getOrCreateErpId();
  const email=erpId+"@smartlife.local";

  return{
    erpId,
    email,
    displayName:erpId,
    subscribedAppInbox:true
  };

}

/* ========= Identify ========= */

window.birdAsyncInit = async function (sdk, conf){

  await sdk.init({config:conf});

  const p=buildProfile();

  await sdk.contact.identify(
  {
    strategy:"Visitor",
    identifier:{key:"emailaddress",value:p.email}
  },
  {
    displayName:p.displayName,
    subscribedAppInbox:p.subscribedAppInbox
  });

  if(sdk.contact.updateCurrent){

    await sdk.contact.updateCurrent({
      displayName:p.displayName,
      subscribedAppInbox:p.subscribedAppInbox
    });

  }

  console.log("Bird Identified as:",p.displayName);
};

</script>

</head>

<body>

<header>

<h2>سمارت لايف</h2>

<button id="dirToggleBtn" class="dir-toggle">
🌐 English
</button>

</header>

<main>

<h1>مرحبًا بك 👋</h1>
<p>اضغط زر الدعم للتواصل معنا</p>

</main>

<!-- زر فتح الشات -->

<button
id="chatTrigger"
class="chat-btn"
data-mbchat-trigger="e745248e-02fc-4580-83ba-7224c55a7327"
>

<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
</svg>

الدعم الفني

</button>


<!-- تحميل SDK -->

<script
async
src="https://embeddables.p.mbirdcdn.net/sdk/v0/bird-sdk.js"
data-config-url="https://api.bird.com/workspaces/a00e85cb-1438-4c76-b1c7-a7e4f2ec3768/applications/7d702097-cc09-4d08-a20b-da3cbe9a1b61/signature/2024-06-17T17-12-51_796d7d7c62"
></script>


<script>

/* ===== إظهار وإخفاء الزر ===== */

const btn=document.getElementById("chatTrigger");

/* عند فتح الشات */

btn.addEventListener("click",()=>{

  btn.style.display="none";

});

/* مراقبة إغلاق الشات */

setInterval(()=>{

  const widget=document.querySelector("iframe[src*='bird']");

  if(!widget){
    btn.style.display="flex";
  }

},1500);

</script>

</body>
</html>
