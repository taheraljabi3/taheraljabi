```html
<!doctype html>
<html lang="en" dir="rtl">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Smart Life Chat</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,"Segoe UI","Cairo",sans-serif;
background:#0b1220;
color:#fff;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:20px;
border-bottom:1px solid rgba(255,255,255,.1);
display:flex;
justify-content:space-between;
align-items:center;
}

main{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:40px;
}

/* زر اللغة */

.dir-toggle{
padding:8px 14px;
border-radius:999px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.08);
color:#fff;
cursor:pointer;
font-weight:600;
}

/* زر الشات */

.chat-btn{

position:fixed;

bottom:25px;

right:25px;

background:linear-gradient(135deg,#6366f1,#4f46e5);

color:white;

border:none;

padding:14px 22px;

border-radius:999px;

font-size:15px;

font-weight:600;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,.25);

transition:all .25s ease;

display:flex;

align-items:center;

gap:8px;

}

.chat-btn:hover{

transform:translateY(-2px);

box-shadow:0 15px 30px rgba(0,0,0,.35);

}

.chat-btn.hidden{
display:none;
}

</style>

<script>

/* ===== توليد رقم ERP ثابت لكل جهاز ===== */

function getOrCreateErpId(){

const key = "sl_erp_identity";

let id = localStorage.getItem(key);

if(!id){

const num = Math.floor(Math.random()*99 + 1).toString().padStart(2,"0");

id = "ERP-mawared-" + num;

localStorage.setItem(key,id);

}

return id;

}

function buildProfile(){

const erpId = getOrCreateErpId();

const email = erpId + "@smartlife.local";

return {

erpId,

email,

displayName: erpId,

subscribedAppInbox: true

};

}

/* ===== تعريف المستخدم قبل تشغيل الشات ===== */

window.birdAsyncInit = async function (sdk, conf) {

await sdk.init({ config: conf });

const p = buildProfile();

await sdk.contact.identify(

{

strategy: "Visitor",

identifier: { key: "emailaddress", value: p.email }

},

{

displayName: p.displayName,

subscribedAppInbox: p.subscribedAppInbox

}

);

if (sdk.contact.updateCurrent) {

await sdk.contact.updateCurrent({

displayName: p.displayName,

subscribedAppInbox: p.subscribedAppInbox

});

}

console.log("Bird Identified as:", p.displayName);

};

</script>

</head>

<body>

<header>

<h2>سمارت لايف</h2>

<button id="dirToggleBtn" class="dir-toggle">🌐 English</button>

</header>

<main>

<h1>مرحبًا بك 👋</h1>

<p>الاسم الظاهر في الشات: ERP-mawared-XX</p>

</main>

<!-- زر فتح الشات -->

<button
id="chatButton"
class="chat-btn"
data-mbchat-trigger="e745248e-02fc-4580-83ba-7224c55a7327"
>
💬 تواصل معنا
</button>


<!-- تحميل SDK -->

<script
async
src="https://embeddables.p.mbirdcdn.net/sdk/v0/bird-sdk.js"
data-config-url="https://api.bird.com/workspaces/a00e85cb-1438-4c76-b1c7-a7e4f2ec3768/applications/7d702097-cc09-4d08-a20b-da3cbe9a1b61/signature/2024-06-17T17-12-51_796d7d7c62"
></script>


<script>

/* ===== إخفاء الزر عند فتح الشات ===== */

const btn = document.getElementById("chatButton");

btn.addEventListener("click",()=>{

btn.classList.add("hidden");

});

/* ===== إظهار الزر عند إغلاق الشات ===== */

const observer = new MutationObserver(()=>{

const widget = document.querySelector("mb-chat-widget");

if(widget){

widget.addEventListener("close",()=>{

btn.classList.remove("hidden");

});

}

});

observer.observe(document.body,{childList:true,subtree:true});

</script>

</body>
</html>
