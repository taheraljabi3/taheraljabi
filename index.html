<!doctype html>

<meta charset="utf-8" />

<title>Bird RTL Test</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  direction: rtl;
}

/* مجرد صندوق اختبار */
.test-box{
  padding:20px;
  border:2px dashed #ccc;
  margin:20px;
}
</style>

</head>

<body>

<div class="test-box">
  صفحة اختبار للـ Bird Widget
</div>

<script>
/* نجبر إعادة حساب الاتجاه بعد تحميل الصفحة */
function forceWidgetReflow(){
  const html = document.documentElement;

  const current = html.getAttribute("dir");

  html.setAttribute("dir","ltr");

  requestAnimationFrame(()=>{
    html.setAttribute("dir",current);
  });
}

/* تنفيذ بعد تحميل widget */
window.addEventListener("load",()=>{
  setTimeout(forceWidgetReflow,500);
});
</script>
